<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEPSEALSEA - GitHub Projects</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#bae6fd">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-canvas: #bae6fd;
            --bg-surface: #ffffff;
            --bg-soft: #f8fafc;
            --bg-hover: #f0f9ff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #dbeafe;
            --accent-primary: #0ea5e9;
            --accent-strong: #0284c7;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
            --shadow-card: 0 6px 20px rgba(14, 116, 144, 0.08);
            --shadow-hover: 0 10px 30px rgba(14, 116, 144, 0.14);
            --theme-button-bg: #ffffff;
            --theme-button-text: #0f172a;
            --theme-button-border: #bfdbfe;
        }

        :root[data-theme='dark'] {
            --bg-canvas: #0f172a;
            --bg-surface: #111827;
            --bg-soft: #1f2937;
            --bg-hover: #1e3a4d;
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-primary: #38bdf8;
            --accent-strong: #0ea5e9;
            --success-bg: rgba(22, 101, 52, 0.26);
            --success-text: #86efac;
            --error-bg: rgba(153, 27, 27, 0.26);
            --error-text: #fca5a5;
            --shadow-card: 0 8px 24px rgba(2, 6, 23, 0.35);
            --shadow-hover: 0 12px 32px rgba(14, 165, 233, 0.2);
            --theme-button-bg: #1e293b;
            --theme-button-text: #e2e8f0;
            --theme-button-border: #475569;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-canvas);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            margin-bottom: 28px;
            background: var(--bg-surface);
            border-radius: 18px;
            padding: 28px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            animation: fadeInUp 0.5s ease-out;
        }

        .header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        h1 {
            color: var(--accent-strong);
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
            font-weight: 500;
        }

        .theme-toggle {
            border: 1px solid var(--theme-button-border);
            border-radius: 999px;
            padding: 8px 14px;
            background: var(--theme-button-bg);
            color: var(--theme-button-text);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .loading {
            text-align: center;
            color: var(--text-primary);
            font-size: 1.05em;
            margin: 56px 0;
            animation: fadeIn 0.35s ease-out;
        }

        .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(14, 165, 233, 0.2);
            border-radius: 50%;
            border-top: 3px solid var(--accent-primary);
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .language-section {
            margin-bottom: 24px;
            background: var(--bg-surface);
            border-radius: 16px;
            padding: 22px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
            opacity: 0;
            transform: translateY(12px);
            transition: background-color 0.25s ease, border-color 0.25s ease;
        }

        .language-header {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        .language-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #ffffff;
            font-size: 15px;
        }

        .language-title {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-right: 12px;
            font-weight: 700;
        }

        .repo-count {
            background: var(--bg-hover);
            color: var(--accent-strong);
            padding: 5px 11px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid var(--border-color);
        }

        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px;
        }

        .repo-card {
            background: var(--bg-soft);
            border-radius: 12px;
            padding: 15px;
            box-shadow: none;
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            opacity: 0;
            transform: translateY(12px);
            display: flex;
            flex-direction: column;
        }

        .repo-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-hover);
        }

        .repo-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .repo-name a {
            color: var(--accent-strong);
            text-decoration: none;
            transition: color 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .repo-name a:hover {
            color: var(--accent-primary);
        }

        .repo-description {
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.45;
            font-size: 0.86rem;
            flex-grow: 1;
        }

        .repo-stats {
            display: flex;
            gap: 13px;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .error {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid rgba(239, 68, 68, 0.35);
            animation: fadeIn 0.3s ease-out;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-surface);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            animation: fadeInUp 0.35s ease-out;
        }

        .stat-number {
            font-size: 2.1rem;
            font-weight: 800;
            color: var(--accent-strong);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .repo-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .live-button,
        .github-button {
            padding: 7px 11px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.78rem;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .live-button {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: #ffffff;
        }

        .live-button:hover {
            background: var(--accent-strong);
            border-color: var(--accent-strong);
        }

        .github-button {
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        .github-button:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            transform: translateY(-1px);
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--success-bg);
            color: var(--success-text);
            padding: 4px 9px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            border: 1px solid rgba(22, 101, 52, 0.28);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .container {
                padding: 14px;
            }

            header {
                padding: 20px;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .repos-grid {
                grid-template-columns: 1fr;
            }

            .stats-overview {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div>
                    <h1>PEPSEALSEA</h1>
                    <p class="subtitle">GitHub Portfolio Dashboard</p>
                </div>
                <button id="theme-toggle" class="theme-toggle" type="button">Dark Mode</button>
            </div>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Fetching repositories from GitHub...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="stats-overview" class="stats-overview" style="display: none;"></div>

        <div id="repositories"></div>
    </div>

    <script>
        const THEME_COOKIE = 'portfolio_theme';

        function setCookie(name, value, days) {
            const expires = new Date(Date.now() + days * 86400000).toUTCString();
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
        }

        function getCookie(name) {
            const row = document.cookie.split('; ').find(item => item.startsWith(`${name}=`));
            return row ? decodeURIComponent(row.split('=')[1]) : null;
        }

        function updateThemeButton(theme) {
            const toggleButton = document.getElementById('theme-toggle');
            if (!toggleButton) return;
            toggleButton.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
        }

        function updateThemeColor(theme) {
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (!metaTheme) return;
            metaTheme.setAttribute('content', theme === 'dark' ? '#0f172a' : '#bae6fd');
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeButton(theme);
            updateThemeColor(theme);
        }

        function initializeTheme() {
            const savedTheme = getCookie(THEME_COOKIE);
            const defaultTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const activeTheme = savedTheme === 'dark' || savedTheme === 'light' ? savedTheme : defaultTheme;

            applyTheme(activeTheme);

            const toggleButton = document.getElementById('theme-toggle');
            if (!toggleButton) return;
            toggleButton.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                applyTheme(nextTheme);
                setCookie(THEME_COOKIE, nextTheme, 365);
            });
        }

        const languageConfig = {
            'TypeScript': { color: 'linear-gradient(135deg, #2b7489, #1e5a6b)', icon: 'TS', priority: 100 },
            'HTML': { color: 'linear-gradient(135deg, #e34c26, #c13018)', icon: 'H', priority: 90 },
            'Python': { color: 'linear-gradient(135deg, #3572A5, #2d5d87)', icon: '🐍', priority: 80 },
            'C#': { color: 'linear-gradient(135deg, #178600, #106200)', icon: 'C#', priority: 70 },
            'JavaScript': { color: 'linear-gradient(135deg, #f1e05a, #d4af37)', icon: 'JS', priority: 60 },
            'React': { color: 'linear-gradient(135deg, #61dafb, #21b7e0)', icon: '⚛️', priority: 55 },
            'Vue': { color: 'linear-gradient(135deg, #4FC08D, #369870)', icon: 'V', priority: 50 },
            'CSS': { color: 'linear-gradient(135deg, #1572B6, #0e4b77)', icon: 'C', priority: 45 },
            'Java': { color: 'linear-gradient(135deg, #b07219, #8b5a15)', icon: '☕', priority: 40 },
            'C++': { color: 'linear-gradient(135deg, #f34b7d, #d93a69)', icon: 'C++', priority: 35 },
            'C': { color: 'linear-gradient(135deg, #555555, #333333)', icon: 'C', priority: 30 },
            'PHP': { color: 'linear-gradient(135deg, #4F5D95, #3d4673)', icon: 'PHP', priority: 25 },
            'Ruby': { color: 'linear-gradient(135deg, #701516, #4a0f10)', icon: '💎', priority: 20 },
            'Go': { color: 'linear-gradient(135deg, #00ADD8, #0088a8)', icon: 'Go', priority: 15 },
            'Rust': { color: 'linear-gradient(135deg, #dea584, #c8936b)', icon: '🦀', priority: 10 },
            'Shell': { color: 'linear-gradient(135deg, #89e051, #6bb83f)', icon: '$', priority: 5 },
            'Other': { color: 'linear-gradient(135deg, #858585, #666666)', icon: '📄', priority: 0 }
        };

        function getLanguagePriority(lang) {
            return languageConfig[lang]?.priority || 0;
        }

        function hasLiveSite(repo) {
            const webLanguages = ['HTML', 'CSS', 'JavaScript', 'TypeScript'];
            const webKeywords = ['website', 'portfolio', 'landing', 'page', 'site', 'web', 'frontend', 'ui', 'dashboard'];
            return webLanguages.includes(repo.language) || webKeywords.some(keyword => (repo.name + ' ' + (repo.description || '')).toLowerCase().includes(keyword)) || repo.has_pages;
        }

        function getLiveSiteUrl(repo) {
            return `https://pepsealsea.github.io/${repo.name}/`;
        }

        async function fetchRepositories() {
            try {
                const response = await fetch('https://api.github.com/users/PEPSEALSEA/repos?per_page=100&sort=updated');
                if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
                const repos = await response.json();

                const reposByLanguage = {};
                let totalRepos = 0, totalStars = 0, totalForks = 0, languages = new Set();

                repos.forEach(repo => {
                    const language = repo.language || 'Other';
                    languages.add(language);
                    reposByLanguage[language] = reposByLanguage[language] || [];
                    reposByLanguage[language].push(repo);
                    totalRepos++;
                    totalStars += repo.stargazers_count;
                    totalForks += repo.forks_count;
                });

                const loadingEl = document.getElementById('loading');
                loadingEl.style.opacity = '0';
                setTimeout(() => { loadingEl.style.display = 'none'; }, 300);

                setTimeout(() => { displayStatsOverview(totalRepos, languages.size, totalStars, totalForks); }, 400);

                const sortedLanguages = Object.keys(reposByLanguage).sort((a, b) => {
                    const priorityA = getLanguagePriority(a);
                    const priorityB = getLanguagePriority(b);
                    if (priorityA !== priorityB) {
                        return priorityB - priorityA;
                    }
                    return reposByLanguage[b].length - reposByLanguage[a].length;
                });
                setTimeout(() => { displayRepositories(reposByLanguage, sortedLanguages); }, 600);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = `
                    <h3>Unable to fetch repositories</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p>Try these alternatives:</p>
                    <ul style="text-align: left; margin-top: 10px;">
                        <li>Open from a local web server</li>
                        <li>Use a web hosting service</li>
                        <li><a href="https://github.com/PEPSEALSEA" target="_blank" style="color: var(--accent-primary);">Visit GitHub profile</a></li>
                    </ul>
                    <button onclick="window.location.reload()" style="margin-top: 10px; padding: 8px 15px; background: var(--accent-primary); color: white; border: none; border-radius: 20px; cursor: pointer;">Try Again</button>
                `;
            }
        }

        function displayStatsOverview(totalRepos, languageCount, totalStars, totalForks) {
            document.getElementById('stats-overview').style.display = 'grid';
            document.getElementById('stats-overview').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalRepos}</div>
                    <div class="stat-label">Total Repositories</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${languageCount}</div>
                    <div class="stat-label">Languages Used</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalStars}</div>
                    <div class="stat-label">Total Stars</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${totalForks}</div>
                    <div class="stat-label">Total Forks</div>
                </div>
            `;
        }

        function displayRepositories(reposByLanguage, sortedLanguages) {
            const container = document.getElementById('repositories');
            sortedLanguages.forEach((language, langIndex) => {
                const repos = reposByLanguage[language];
                const config = languageConfig[language] || languageConfig['Other'];
                const section = document.createElement('div');
                section.className = 'language-section';
                section.innerHTML = `
                    <div class="language-header">
                        <div class="language-icon" style="background: ${config.color}">${config.icon}</div>
                        <div class="language-title">${language}</div>
                        <div class="repo-count">${repos.length} repos</div>
                    </div>
                    <div class="repos-grid">
                        ${repos.map((repo, index) => `
                            <div class="repo-card">
                                <div class="repo-name">
                                    <a href="${repo.html_url}" target="_blank">${repo.name}</a>
                                    ${hasLiveSite(repo) ? '<div class="live-indicator"><div class="live-dot"></div>Live Site</div>' : ''}
                                </div>
                                <div class="repo-description">${repo.description || 'No description available'}</div>
                                <div class="repo-stats">
                                    <div class="stat"><span>⭐</span><span>${repo.stargazers_count}</span></div>
                                    <div class="stat"><span>🍴</span><span>${repo.forks_count}</span></div>
                                    <div class="stat"><span>📅</span><span>${new Date(repo.updated_at).toLocaleDateString()}</span></div>
                                </div>
                                <div class="repo-buttons">
                                    <a href="${repo.html_url}" target="_blank" class="github-button"><span>📁</span>View Code</a>
                                    ${hasLiveSite(repo) ? `<a href="${getLiveSiteUrl(repo)}" target="_blank" class="live-button"><span>🌐</span>View Live Site</a>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            document.querySelectorAll('.language-section, .repo-card').forEach(element => {
                observer.observe(element);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            fetchRepositories();
        });
    </script>
</body>

</html>
